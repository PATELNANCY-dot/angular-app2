<html>
<body>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <div class="container">
    <form [formGroup]="registrationForm">

      <h1>
        <span style="color:orangered">Individual-</span>
        <span style="color:navy">Nominee Details</span>
      </h1>
      <br />
      <h3 style="color:darkorange">Nominee Details</h3>
      <br />

      <!--Nominee Name-->
      <div>
        <div class="form-col">
          <label>Nominee Name:</label>
          <input type="text" formControlName="nomineeName">
        </div>
      </div>

      <br />
      <!--Nominee Relation-->
      <div>
        <div class="form-col">
          <label>Nominee Relation:</label>
          <input type="text" formControlName="nomineeRelation">
        </div>
      </div>

      <br />

      <!--Nominee Date Of Birth-->
      <div>
        <div class="form-col">
          <label> Date Of Birth:</label>
          <input type="date" formControlName="nomineeDob" >
        </div>
      </div>

      <br />

      <!--Pan Number-->
      <div>
        <div class="form-col">
          <label>Pan Number:</label>
          <input type="text" inputmode="numeric" formControlName="nomineePan" >
        </div>
      </div>

      <br />
      <br />
      <!--submit button-->
      <div class="form-actions">
        <button type="button" (click)="submit()" class="next-btn">Submit</button>
      </div>

    </form>
  </div>
</body>
</html>
