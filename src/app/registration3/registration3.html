<html>
<body>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <div class="container">
    <form [formGroup]="registrationForm">

      <h1>
        <span style="color:orangered">Individual-</span>
        <span style="color:navy">Bank Details</span>
      </h1>


      <!-- Bank Name + Account Number -->
      <div class="form-row">
        <div class="form-col">
          <label>Bank Name:</label>
          <input type="text" list="BankName" placeholder="Select Option" formControlName="bankName">

          <datalist id="BankName">
            <option value="Bank of Baroda"></option>
            <option value="HDFC Bank"></option>
            <option value="Axis Bank"></option>
          </datalist>
        </div>

        <div class="form-col">
          <label>Account Number:</label>
          <input type="text" inputmode="numeric" formControlName="accountNumber">
        </div>
      </div>

      <!-- Branch Name + IFSC Code -->
      <div class="form-row">
        <div class="form-col">
          <label>Branch Name:</label>
          <input type="text" list="BranchName" placeholder="Select Option" formControlName="branchName">

          <datalist id="BranchName">
            <option value="Vastrapur"></option>
            <option value="Odhav"></option>
            <option value="Naroda"></option>
          </datalist>
        </div>

        <div class="form-col">
          <label>IFSC Code:</label>
          <input type="text" inputmode="numeric" formControlName="ifscCode">
        </div>
      </div>

      <!-- Branch Address + MICR Code -->
      <div class="form-row">
        <div class="form-col">
          <label>Branch Address:</label>
          <input type="text" formControlName="branchAddress">
        </div>

        <div class="form-col">
          <label>MICR Code:</label>
          <input type="text" inputmode="numeric" formControlName="micrCode">
        </div>
      </div>


      <!-- Bank Statement + Cancel Cheque -->
      <div class="form-row">
        <div class="form-col">
          <label>Bank Statement:</label>
          <div class="form-col otp-row">
            <button>Choose File</button>
            <input type="text" placeholder="No file Chosen">
            <button class="confirm">Preview</button>
          </div>
        </div>
        <div class="form-col">
          <label>Cancel Cheque:</label>
          <div class="form-col otp-row">
            <button>Choose File</button>
            <input type="text" placeholder="No file Chosen">
            <button class="confirm">Preview</button>
          </div>
        </div>
      </div>



      <!--next button-->
      <div class="form-actions">
        <button type="button" (click)="goNext()" class="next-btn">Next<span><i class="bi bi-caret-right-fill"></i></span></button>
      </div>

    </form>
  </div>
</body>
</html>
