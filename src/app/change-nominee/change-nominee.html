<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">






<div class="main-wrapper">

  <h5 class="page-title">Nominee Information</h5>

  <div class="content-wrapper">


    <div class="form-box">

      <form [formGroup]="nomineeForm" (ngSubmit)="updateNominee()">

        <div class="form-row">
          <div class="form-col">
            <label>Nominee Name:</label>
            <input formControlName="nomineeName" placeholder="Nominee Name" />
          </div>

          <div class="form-col">
            <label>DOB(DD/MM/YYYY):</label>
            <input formControlName="nomineeDob" type="date" placeholder="DOB" />
          </div>

          <div class="form-col">
            <label>Relationship With Client:</label>
            <input formControlName="nomineeRelation" placeholder="Relation" />
          </div>


          <div class="form-col">
            <label>Nominee Pan(Optional):</label>
            <input formControlName="nomineePan" placeholder="Nominee PAN" />
          </div>

          <div class="form-col">
            <label>Precentage:</label>
            <input type="text">
          </div>
        </div>


        <div class="form-row">
          <div class="form-col">
            <label>Address 1:</label>
            <input type="text">
          </div>

          <div class="form-col">
            <label>Address 2:</label>
            <input type="text">
          </div>
        </div>

        <br />

        <span><b> If Nominee is Minor <br /></b> </span>
        <div class="form-row">
          <div class="form-col">
            <label>Guardian Pan(Optional)</label>
            <input type="text" placeholder="Guardian Pan(Optional)" style="background-color:lightgray" formControlName="guardianPan">
          </div>

          <div class="form-col">
            <label>Name of parent/Guardian</label>
            <input type="text" placeholder="Name of parent/Guardian" style="background-color:lightgray" formControlName="guardianName">
          </div>
        </div>



        <div class="form-row">
          <div class="form-col">
            <label>Guardian Dob</label>
            <input type="date" placeholder="DOB" formControlName="guardianDob" />
          </div>
          <div class="form-col">
            <label>Relationship of Guardian with minor</label>
            <input type="text" placeholder="Relationship of Guardian with minor" style="background-color:lightgray" formControlName="guardianRelation">
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="next-btn"><span><i class="bi bi-plus-circle"></i>  ADD NOMINEE</span></button>
        </div>

      </form>

      <br />


    </div>

  </div>

</div>
