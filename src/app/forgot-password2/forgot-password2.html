<div class="forgot-wrapper">
  <div class="forgot-container">

    <!-- Logo -->
    <div class="logo-circle">
      <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" alt="Logo">
    </div>

    <h2>Forgot Password?</h2>
    <p class="subtitle">Please Enter OTP you recived in registered Email</p>

    <form>
      <div class="form-group">
        <input type="text" class="otp-input" inputmode="numeric" placeholder="Enter OTP" required>
   
      </div>

      <div class="button-group">

        <button (click)="goBack()" type="button" class="cancel-btn">
          Cancel
        </button>

        <button (click)="verifyOtp()" type="submit" class="next-btn">
          Submit
        </button>

      </div>
    </form>


  </div>
</div>
