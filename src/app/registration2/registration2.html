<html>
<body>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <div class="container">
    <form [formGroup]="registrationForm">

      <h1>
        <span style="color:orangered">Individual-</span>
        <span style="color:navy">Personal Details</span>
      </h1>


      <!-- PAN NUMBER + PAN CARD PROOF -->
      <div class="form-row">
        <div class="form-col">
          <label>Pan Number:</label>
          <input type="text" inputmode="numeric" formControlName="pan">
        </div>
        <div class="form-col">
          <label>Pan Card Proof:</label>
          <div class="form-col otp-row">
            <button>Choose File</button>
            <input type="text" placeholder="no file chosen" disabled>
            <button class="confirm">Preview</button>
          </div>
        </div>
      </div>

      <!-- Date of Birth + Aadhar Number -->
      <div class="form-row">
        <div class="form-col">
          <label>Date of Birth:</label>
          <input type="date" formControlName="dob">
        </div>

        <div class="form-col">
          <label>Aadhar Number:</label>
          <input type="text" inputmode="numeric" formControlName="aadhar">
        </div>
      </div>

      <!-- Nationality + Place of Birth -->
      <div class="form-row">
        <div class="form-col">
          <label>Nationality:</label>
          <input type="text" list="Nationality" placeholder="Select Option" formControlName="nationality">

          <datalist id="Nationality">
            <option value="India"></option>
            <option value="USA"></option>
            <option value="South Korea"></option>
          </datalist>
        </div>

        <div class="form-col">
          <label>Place of Birth:</label>
          <input type="text"  formControlName="placeOfBirth">
        </div>
      </div>

      <!-- State + Corressponding State -->
      <div class="form-row">
        <div class="form-col">
          <label>State:</label>
          <input type="text" list="State" placeholder="Select Option"  >

          <datalist id="State">
            <option value="Gujarat"></option>
            <option value="Mumbai"></option>
            <option value="Rajasthan"></option>
          </datalist>
        </div>


        <div class="form-col">
          <label>Corressponding State:</label>
          <input type="text" list="CorresspondingState" inputmode="numeric" placeholder="Select Option" >

          <datalist id="CorresspondingState">
            <option value="Gujarat"></option>
            <option value="Mumbai"></option>
            <option value="Rajasthan"></option>
          </datalist>
        </div>
      </div>

      <!-- City + Corressponding City -->
      <div class="form-row">
        <div class="form-col">
          <label>City:</label>
          <input type="text" list="City" placeholder="Select Option" >

          <datalist id="City">
            <option value="Ahmedabad"></option>
            <option value="Surat"></option>
            <option value="Rajkot"></option>
          </datalist>
        </div>


        <div class="form-col">
          <label>Corressponding City:</label>
          <input type="text" list="CorresspondingCity" inputmode="numeric" placeholder="Select Option" >

          <datalist id="CorresspondingCity">
            <option value="Ahmedabad"></option>
            <option value="Surat"></option>
            <option value="Rajkot"></option>
          </datalist>
        </div>
      </div>


      <!-- Permanent Address + Corressponding Address -->
      <div class="form-row">
        <div class="form-col">
          <label>Permanent Address:</label>
          <textarea style="width:600px;height:90px" formControlName="permanentAddress"></textarea>
        </div>
        <div class="form-col">
          <label> Corressponding Address:</label>
          <textarea style="width:600px;height:90px" formControlName="correspondingAddress"></textarea>
        </div>
      </div>

      <!-- Permanent Address Proof + Corressponding Address Proof -->
      <div class="form-row">
        <div class="form-col">
          <label>Permanent Address Proof:</label>
          <div class="form-col otp-row">
            <button>Choose File</button>
            <input type="text"  placeholder="No file Chosen">
            <button class="confirm">Preview</button>
          </div>
        </div>
        <div class="form-col">
          <label> Corressponding Address Proof:</label>
          <div class="form-col otp-row">
            <button>Choose File</button>
            <input type="text" placeholder="No file Chosen">
            <button class="confirm">Preview</button>
          </div>
        </div>
      </div>


      <!-- pin Code + Gender -->
      <div class="form-row">
        <div class="form-col">
          <label>pin Code:</label>
          <input type="text" formControlName="pincode">
        </div>

        <div class="form-row">
          <div class="form-col">
            <label>Gender:</label>
            <input type="text" formControlName="gender">
          </div>

        </div>
      </div>
      <!--next button-->
      <div class="form-actions">
        <button type="button" (click)="goNext()" class="next-btn">Next<span><i class="bi bi-caret-right-fill"></i></span></button>
      </div>

    </form>
  </div>
</body>
</html>
