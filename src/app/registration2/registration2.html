
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <div class="container">
    <form [formGroup]="registrationForm">

      <h1>
        <span style="color:orangered">Individual-</span>
        <span style="color:navy">Personal Details</span>
      </h1>


      <!-- PAN NUMBER + PAN CARD PROOF -->
      <div class="form-row">
        <div class="form-col">
          <label>Pan Number:</label>
          <input type="text" inputmode="numeric" formControlName="pan">
        </div>

        <div class="form-col">
          <label>Upload PAN CARD PROOF</label>
          <div class="file-upload" style="position: relative;">
            <input type="file" id="panUpload" class="form-control" (change)="onPanFileSelected($event)">
            <label for="panUpload" class="file-label">
              <div *ngIf="!selectedPanFile" style="pointer-events:none; color:#6c757d; font-size:14px;">
                <i class="bi bi-cloud-upload"></i> Choose file
              </div>

              <div *ngIf="selectedPanFile" class="selected-file mt-2 p-2 border rounded d-flex justify-content-between align-items-center" style="background:#f8f9fa; cursor:pointer;">
                <span (click)="openPanFile()" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:80%;">
                  {{ selectedPanFile.name }}
                </span>
                <button type="button" class="btn btn-sm btn-outline-danger ms-2" (click)="removePanFile()">×</button>
              </div>
            </label>
          </div>
        </div>
      </div>



      <!-- Date of Birth + Aadhar Number -->
      <div class="form-row">
        <div class="form-col">
          <label> Date of Birth:</label>
          <div class="date-wrapper">
            <input type="text"
                   formControlName="dob"
                   class="custom-date"
                   #dobInput
                   placeholder="Select Date of Birth"
                   (click)="toggleCalendar()" />

            <span class="calendar-icon" (click)="toggleCalendar()">
              <i class="bi bi-calendar3"></i>
            </span>
          </div>
        </div>

        <div class="form-col">
          <label>Aadhar Number:</label>
          <input type="text" inputmode="numeric" formControlName="aadhar">
        </div>
      </div>

      <!-- Nationality + Place of Birth -->
      <div class="form-row">
        <div class="form-col">
          <label>Nationality:</label>

          <div class="custom-dropdown">

            <div class="dropdown-selected"
                 (click)="toggleCountry()">
              {{ getSelectedCountryName() }}
              <i class="bi bi-chevron-down"></i>
            </div>

            <div class="dropdown-list" *ngIf="countryDropdownOpen">
              <div class="dropdown-item"
                   *ngFor="let country of countries"
                   (click)="selectCountry(country)">
                {{ country.countryName }}
              </div>
            </div>

          </div>
        </div>

        <div class="form-col">
          <label>Place of Birth:</label>
          <input type="text" formControlName="placeOfBirth">
        </div>
      </div>

      <!-- State + Corressponding State -->
      <div class="form-row">
        <div class="form-col">
          <label>State:</label>


          <div class="custom-dropdown">

            <div class="dropdown-selected"
                 (click)="toggleState()">
              {{ getSelectedStateName() }}
              <i class="bi bi-chevron-down"></i>
            </div>

            <div class="dropdown-list" *ngIf="stateDropdownOpen">
              <div class="dropdown-item"
                   *ngFor="let s of states"
                   (click)="selectState(s)">
                {{ s.stateName }}
              </div>
            </div>

          </div>
        </div>


        <div class="form-col">
          <label>Corressponding State:</label>


          <div class="custom-dropdown">

            <div class="dropdown-selected"
                 (click)="toggleCorrespondingState()">
              {{ getSelectedCorrespondingStateName() }}
              <i class="bi bi-chevron-down"></i>
            </div>

            <div class="dropdown-list" *ngIf="correspondingStateDropdownOpen">
              <div class="dropdown-item"
                   *ngFor="let s of correspondingStates"
                   (click)="selectCorrespondingState(s)">
                {{ s.stateName }}
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- City + Corressponding City -->
      <div class="form-row">
        <div class="form-col">
          <label>City:</label>

          <div class="custom-dropdown">

            <div class="dropdown-selected"
                 (click)="toggleCity()">
              {{ getSelectedCityName() }}
              <i class="bi bi-chevron-down"></i>
            </div>

            <div class="dropdown-list" *ngIf="cityDropdownOpen">
              <div class="dropdown-item"
                   *ngFor="let c of cities"
                   (click)="selectCity(c)">
                {{ c.cityName }}
              </div>
            </div>

          </div>
        </div>


        <div class="form-col">
          <label>Corressponding City:</label>

          <div class="custom-dropdown">

            <div class="dropdown-selected"
                 (click)="toggleCorrespondingCity()">
              {{ getSelectedCorrespondingCityName() }}
              <i class="bi bi-chevron-down"></i>
            </div>

            <div class="dropdown-list" *ngIf="correspondingCityDropdownOpen">
              <div class="dropdown-item"
                   *ngFor="let c of correspondingCities"
                   (click)="selectCorrespondingCity(c)">
                {{ c.cityName }}
              </div>
            </div>

          </div>
        </div>
      </div>


      <!-- Permanent Address + Corressponding Address -->
      <div class="form-row">
        <div class="form-col">
          <label>Permanent Address:</label>
          <textarea formControlName="permanentAddress"></textarea>
        </div>
        <div class="form-col">
          <label> Corressponding Address:</label>
          <textarea formControlName="correspondingAddress"></textarea>
        </div>
      </div>

      <!-- Permanent Address Proof + Corressponding Address Proof -->
      <div class="form-row">
        <div class="form-col">
          <label>Upload Address Proof</label>
          <div class="file-upload" style="position: relative;">
            <input type="file" id="addressUpload" class="form-control" (change)="onAddressFileSelected($event)">
            <label for="addressUpload" class="file-label">
              <div *ngIf="!selectedAddressFile" style="pointer-events:none; color:#6c757d; font-size:14px;">
                <i class="bi bi-cloud-upload"></i> Choose file
              </div>

              <div *ngIf="selectedAddressFile" class="selected-file mt-2 p-2 border rounded d-flex justify-content-between align-items-center" style="background:#f8f9fa; cursor:pointer;">
                <span (click)="openAddressFile()" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:80%;">
                  {{ selectedAddressFile.name }}
                </span>
                <button type="button" class="btn btn-sm btn-outline-danger ms-2" (click)="removeAddressFile()">×</button>
              </div>
            </label>
          </div>
        </div>

        <div class="form-col">
          <label>Upload Corresponding Address Proof</label>
          <div class="file-upload" style="position: relative;">
            <input type="file" id="correspondingAddressUpload" class="form-control" (change)="onCorrespondingAddressFileSelected($event)">
            <label for="correspondingAddressUpload" class="file-label">
              <div *ngIf="!selectedCorrespondingAddressFile" style="pointer-events:none; color:#6c757d; font-size:14px;">
                <i class="bi bi-cloud-upload"></i> Choose file
              </div>

              <div *ngIf="selectedCorrespondingAddressFile" class="selected-file mt-2 p-2 border rounded d-flex justify-content-between align-items-center" style="background:#f8f9fa; cursor:pointer;">
                <span (click)="openCorrespondingAddressFile()" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:80%;">
                  {{ selectedCorrespondingAddressFile.name }}
                </span>
                <button type="button" class="btn btn-sm btn-outline-danger ms-2" (click)="removeCorrespondingAddressFile()">×</button>
              </div>
            </label>
          </div>
        </div>
      </div>


      <!-- pin Code + Gender -->
      <div class="form-row">
        <div class="form-col">
          <label>pin Code:</label>
          <input type="text" formControlName="pincode">
        </div>


        <div class="form-col">
          <label>Gender:</label>
          <input type="text" formControlName="gender">
        </div>


      </div>
      <!--next button-->
      <div class="form-actions">
        <button type="button" (click)="goBack()" class="next-btn"><span><i class="bi bi-arrow-left"></i></span>Back</button>

        <button type="button" (click)="goNext()" class="back-btn">Next<span><i class="bi bi-arrow-right"></i></span></button>
      </div>




    </form>
  </div>
