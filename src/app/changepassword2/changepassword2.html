<div class="page">
  <div class="container">
    <!-- LEFT SIDE -->
    <div class="box rules-wrapper">
      <div class="logo-circle2">
        <img src="https://static.vecteezy.com/system/resources/thumbnails/015/937/375/small/illustration-design-of-a-person-working-in-front-of-a-laptop-while-sitting-cross-legged-free-vector.jpg"  alt="Reset Password">
      </div>

      <div class="password-rules">
        <ul>
          <li>At least 8 characters long</li>
          <li>Contains one uppercase letter</li>
          <li>Contains one lowercase letter</li>
          <li>Contains one number</li>
          <li>Contains one special character</li>
        </ul>
      </div>
</div>
      <!-- RIGHT SIDE -->
      <div class="box right">
        <div class="logo-circle">
          <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" alt="Logo">
        </div>

        <h2>Set New Password</h2>


        <form>
          <br />
          <div class="form-group">
            <input type="password" placeholder="New Password" required>
          </div>
          <br />
          <div class="form-group">
            <input type="password" placeholder="Confirm Password" required>
          </div>

          <br />
          <br />

          <div class="button-group">

            <button  (click)="goBack()" type="button" class="cancel-btn">
              Cancel
            </button>

            <button (click)="goNext()" type="submit" class="next-btn">
              Next
            </button>

          </div>
        </form>
      </div>
    </div>
</div>
