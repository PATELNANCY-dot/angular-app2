<div class="page">
  <div class="container">
    <!-- LEFT SIDE -->
    <div class="box left">
      <h2 class="left" style="text-align:center">Sign Up</h2>
      <br /><br /><br /><br /><br /><br /><br /><br />
      <button>Join Now</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="box right">
      <form>
        <h2 style="text-align:center">Sign In</h2>

        <!-- Bind email and password to component -->
        <input class="textf" type="text" placeholder="username" [(ngModel)]="username" name="username" />
        <input class="textf" type="password" placeholder="Password" [(ngModel)]="password" name="password" />


        <p *ngIf="errorMessage" style="color:red; margin-top:10px;">{{ errorMessage }}</p>


        <!-- Links -->
        <a routerLink="/forgot-password" style="color:black">Forgot password? </a>
        <b><a style="color:orangered" routerLink="/login-otp">Login with OTP</a></b>
        <br />


        <!-- Login button -->
        <div style="text-align:center; margin-bottom:15px;">
          <button type="button" (click)="login()">Login</button>

        </div>
      </form>
    </div>
  </div>
</div>
