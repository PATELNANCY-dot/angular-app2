<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<!-- Custom Alert -->

<div class="page">

  <div class="container">
    <!-- LEFT SIDE -->
    <div class="box left">
      <h2>New Here?</h2>
      <p>Create your account and start investing with Liquiloans!</p>
      <button routerLink="/signup">Join Now</button>
    </div>




    <!-- RIGHT SIDE -->
    <div class="box right">
      <form>
        <h2>Sign In</h2>

        <!-- Inputs -->
        <input class="textf"
               type="text"
               placeholder="Username"
               [(ngModel)]="username"
               name="username" />
        <input class="textf"
               type="password"
               placeholder="Password"
               [(ngModel)]="password"
               name="password" />



        <!-- Links -->
        <div class="links">
          <a routerLink="/forgot-password">Forgot password?</a>
          <a routerLink="/login-otp" class="otp-link">Login with OTP</a>
        </div>
        <a style="color:red">{{errorMessage}}</a>
        <!-- Login button -->
        <div  style="text-align:center; margin-bottom:15px;">
        <button type="button" (click)="login()" class="login-btn">
          Login
        </button>
        </div>
      </form>
    </div>
  </div>
</div>
