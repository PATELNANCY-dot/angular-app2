<div class="page">
  <div class="container">

    <!-- LEFT SIDE -->
    <div class="box left">
      <h2 style="text-align:center">Sign Up</h2>
      <br /><br /><br /><br /><br /><br /><br /><br />
      <button>Join Now</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="box right">
      <form>
        <h2 style="text-align:center">Sign In</h2>

        <!-- Mobile number -->
        <input class="textf"
               type="text"
               placeholder="Mobile Number" />

        <!-- OTP BOXES -->
        <div class="otp-container">
          <input type="text"
                 maxlength="1"
                 class="otp-input"
                 (input)="moveNext($event)"
                 (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input"
                 (input)="moveNext($event)"
                 (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input"
                 (input)="moveNext($event)"
                 (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input"
                 (input)="moveNext($event)"
                 (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input"
                 (input)="moveNext($event)"
                 (keydown.backspace)="moveBack($event)" />
          <input type="text" maxlength="1" class="otp-input"
                 (input)="moveNext($event)"
                 (keydown.backspace)="moveBack($event)" />
        </div>

        <!-- RESEND -->
        <div style="text-align:center; margin-bottom:15px;">
          <button type="button" (click)="generateOtp()"  id="bt1">Resend</button>
        </div>

        <a style="color:black">Forgot password?</a>
        <b>
          <a style="color:orangered" routerLink="/login">
            Login with Password
          </a>
        </b>

        <br /><br />

        <!-- SUBMIT -->
        <div style="text-align:center; margin-bottom:15px;">
          <button type="button"  (click)="verifyOtp()">Submit</button>
        </div>
      </form>
    </div>

  </div>
</div>
