<div class="forgot-wrapper">
  <div class="forgot-container">

    <!-- Logo -->
    <div class="logo-circle">
      <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" alt="Logo">
    </div>

    <h2>Forgot Password?</h2>
    <p class="subtitle">Enter your email to reset your password</p>

    <form>
      <div class="form-group">
        <input type="email" inputmode="email" placeholder="Enter your email" required>
      </div>

      <div class="button-group">

        <button (click)="goBack()" type="button" class="cancel-btn">
          Cancel
        </button>

        <button (click)="goNext()" type="submit" class="next-btn">
          Next
        </button>

      </div>
    </form>


  </div>
</div>
