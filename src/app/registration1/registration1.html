
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <div class="container">
    <form [formGroup]="registrationForm">

      <h1>
        <span style="color:orangered">Individual-</span>
        <span style="color:navy">Registration</span>
      </h1>

      <!-- NAME -->
      <div class="form-row">
        <div class="form-col">
          <label>Name:</label>
          <input id="name" type="text" formControlName="name">
        </div>
      </div>

      <!-- EMAIL + MOBILE -->
      <div class="form-row">
        <div class="form-col">
          <label>Email:</label>
          <input type="email" formControlName="email">
        </div>

        <div class="form-col">
          <label>Mobile:</label>
          <input type="text" inputmode="numeric" placeholder="Enter your Mobile No" formControlName="mobile">
        </div>
      </div>

      <p class="note note-row" style="color:red">
        <span>* Verify authentication of your email by entering OTP</span>
        <span>* Verify authentication of your mobile number by entering OTP</span>
      </p>


      <!-- OTP EMAIL + OTP MOBILE -->
      <div class="form-row">

        <div class="form-col">
          <div class="otp-clean">
            <input type="text" placeholder="Enter Mobile OTP">
            <span class="otp-link">Verify</span>
            <span class="divider">|</span>
            <span class="otp-link strong">Confirm</span>
          </div>
        </div>

        <div class="form-col">
          <div class="otp-clean">
            <input type="text" placeholder="Enter Email OTP">
            <span class="otp-link">Verify</span>
            <span class="divider">|</span>
            <span class="otp-link strong">Confirm</span>
          </div>
        </div>

      </div>
      <!-- PASSWORD + CONFIRM PASSWORD -->
      <div class="form-row">
        <div class="form-col">
          <label>Password:</label>
          <input type="password" formControlName="Password_1">
        </div>

        <div class="form-col">
          <label>Confirm Password:</label>
          <input type="password">
        </div>
      </div>
      <!--next button-->
      <div class="form-actions">
        <button type="button" (click)="goBack()" class="next-btn"><span><i class="bi bi-arrow-left"></i></span>Back</button>

        <button type="button" (click)="goNext()" class="back-btn">Next<span><i class="bi bi-arrow-right"></i></span></button>
      </div>

    </form>
  </div>
