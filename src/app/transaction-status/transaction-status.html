<div class="status-wrapper">
  <div class="status-card" [ngClass]="getStatusClass()">

    <!-- ICON -->
    <div class="icon-wrapper">
      <i class="bi" [ngClass]="getIcon()"></i>
    </div>

    <!-- TITLE -->
    <h2 class="status-title">{{ status | titlecase }}</h2>

    <p class="status-subtitle">
      Your transaction was {{ status }}.
    </p>

    <!-- DETAILS -->
    <div class="details-box mt-4">

      <div class="detail-row">
        <span>Transaction ID</span>
        <strong>{{ transactionId }}</strong>
      </div>

      <div class="detail-row">
        <span>Amount</span>
        <strong>₹{{ amount }}</strong>
      </div>

      <div class="detail-row">
        <span>Date & Time</span>
        <strong>{{ transactionTime }}</strong>
      </div>

      <div class="detail-row">
        <span>Status</span>
        <strong>{{ status | titlecase }}</strong>
      </div>

    </div>

    <!-- BUTTONS -->
    <div class="button-group mt-4">
      <a routerLink="/dashboard" class="btn modern-btn dashboard-btn">
        Back to Dashboard
      </a>
      <button class="btn modern-btn download-btn" (click)="downloadPDF()">
        Download PDF
      </button>
    </div>
  </div>
</div>
