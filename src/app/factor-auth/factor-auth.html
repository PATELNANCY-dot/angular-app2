<div class="page">
  <div class="container">
    <!-- LEFT SIDE -->
    <div class="box left">
      <h2>Sign Up</h2>
      <br /><br /><br /><br /><br /><br /><br /><br />
      <button>Join Now</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="box right">
      <form>
        <h2 class="right">Two Factor Auhentication</h2>

        <!-- Bind email and password to component -->
        <div class="date-wrapper">
          <input type="text"
                 [(ngModel)]="dob"
                 #nomineeDobInput
                 class="custom-date"
                 placeholder="Select Date"
                 (click)="toggleNomineeCalendar()" />

          <span class="calendar-icon"
                (click)="toggleNomineeCalendar()">
            <i class="bi bi-calendar3"></i>
          </span>
        </div>

        <input class="textf" type="text" placeholder="PAN" name="pan" [(ngModel)]="pan" />





        <!-- Login button -->
        <div style="text-align:center; margin-bottom:15px;">
          <button (click)="submit()" type="button">Submit</button>

        </div>
      </form>
    </div>
  </div>
</div>
